<!DOCTYPE html>
<html>
<head>
    <title>Student Login - Admission Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #c4edf8;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            justify-content: center;
        }
        .login-box {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);
        }
        input {
            width: 325px;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            width: 345px;
            padding: 10px;
            background-color: #5c1456;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #16a085;
        }
        .admin-btn {
            width: 385px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h3 style="text-align:center; margin-bottom: 20px;">
    P.R. POTE COLLEGE OF ENGINEERING AND MANAGEMENT <br>
    Department of MCA
</h3>

<div class="login-box">
    <h2 style="text-align:center;">Student Login</h2>
    <form action="LoginServlet" method="post">
        <label>Email:</label>
        <input type="email" name="email" placeholder="Enter Email" required>

        <label>Password:</label>
        <input type="password" name="password" placeholder="Enter Password" required>

        <button type="submit">Login</button>
    </form>
    <p style="text-align: center;">
        New Student? <a href="register-page.html">Register here</a>
    </p>
</div>

<button class="admin-btn" onclick="window.location.href='admin.html'">
    Admin Login
</button>

</body>
</html>
