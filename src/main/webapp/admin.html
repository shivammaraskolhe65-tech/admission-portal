<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - Admission Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #c4edf8;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            justify-content: center;
        }
        .login-box {
            background-color: white;
            padding: 30px;
            border: 2px solid #999999;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);
        }
        input {
            width: 290px;
            padding: 8px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            width: 308px;
            padding: 10px;
            background-color: #5c1456;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover {
            background-color: #16a085;
        }
    </style>
</head>
<body>

    <h3 style="text-align: center; margin-bottom: 30px;">
        P.R. POTE COLLEGE OF ENGINEERING AND MANAGEMENT <br>
        Department of Master in Computer Application
    </h3>

    <div class="login-box">
        <h2 style="text-align: center; margin-top: 0;">Admin Login</h2>
        <form action="AdminLoginServlet" method="post">
            <label>Username :</label>
            <input type="text" name="username" placeholder="Enter Username" required>

            <label>Password :</label>
            <input type="password" name="password" placeholder="Enter Password" required>

            <button type="submit">Login</button>
        </form>
    </div>

</body>
</html>
